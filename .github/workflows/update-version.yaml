name: Bump Package Version on Merge

on:
  push:
    branches:
      - main
      - develop

jobs:
  bump_version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "21"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Determine Version Bump Type
        id: version_type
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "version_type=minor" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "version_type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump Version
        id: bump_version
        working-directory: ./client
        run: |
          NEW_VERSION=$(pnpm version ${{ steps.version_type.outputs.version_type }})
          git tag -a $NEW_VERSION -m "Bump version to $NEW_VERSION"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Push Changes and Tag
        run: |
          git add client/package.json
          git commit -m "Bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push origin ${{ github.ref_name }}
          git push origin ${{ steps.bump_version.outputs.new_version }}
