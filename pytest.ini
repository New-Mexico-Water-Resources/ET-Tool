[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: offline tests that do not require network access
    integration: end-to-end tests that require AWS S3 access
    data_quality: live reference comparisons against OpenET API and data pipelines
addopts = -ra --strict-markers --import-mode=importlib
